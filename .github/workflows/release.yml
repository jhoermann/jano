name: Release to npm

on:
  push:
    tags:
      - "plugin-types-v*"
      - "ui-v*"
      - "editor-v*"

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine package from tag
        id: pkg
        run: |
          TAG="${{ github.ref_name }}"
          # extract package name and version from tag (e.g. plugin-types-v1.0.0)
          if [[ "$TAG" =~ ^plugin-types-v(.+)$ ]]; then
            echo "dir=packages/plugin-types" >> $GITHUB_OUTPUT
            echo "name=@jano-editor/plugin-types" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "filter=@jano-editor/plugin-types" >> $GITHUB_OUTPUT
          elif [[ "$TAG" =~ ^ui-v(.+)$ ]]; then
            echo "dir=packages/ui" >> $GITHUB_OUTPUT
            echo "name=@jano-editor/ui" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "filter=@jano-editor/ui" >> $GITHUB_OUTPUT
          elif [[ "$TAG" =~ ^editor-v(.+)$ ]]; then
            echo "dir=packages/editor" >> $GITHUB_OUTPUT
            echo "name=@jano-editor/editor" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "filter=@jano-editor/editor" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag: $TAG"
            exit 1
          fi

      - name: Build
        run: pnpm --filter ${{ steps.pkg.outputs.filter }} build --if-present

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ steps.pkg.outputs.name }} ${{ steps.pkg.outputs.version }}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
